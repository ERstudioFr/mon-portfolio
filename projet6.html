    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="projets.css">
    <link rel="stylesheet" href="magazine.css">
</head>
<body>

<nav>

        <img src="./images/Logo beige.svg" alt="Logo Enzo Ruiz">
    </a>
    <button class="burger" aria-label="Menu" aria-expanded="false"><span></span></button>
    <ul>

<!-- ================= CONTENU PROJET ================= -->

<section class="section-content">

    <h1 class="show-on-scroll">titre du projet 6</h1>

    <p class="show-on-scroll">
        Description de ce projet. Remplacez ce texte par votre propre contenu lorsque le projet sera prêt.
    </p>

    <!-- Visionneuse Magazine PDF -->
    <div class="magazine-container show-on-scroll">
        <div class="magazine-controls">
            <button id="prevBtn" onclick="changePage(-1)">← Précédent</button>
            <span class="page-counter"><span id="currentPage">1</span> / <span id="totalPages">1</span></span>
            <button id="nextBtn" onclick="changePage(1)">Suivant →</button>
        </div>
        
        <div class="magazine-book" id="magazineBook">
            <div class="spine"></div>
            <div class="magazine-page page-left" id="pageLeft">
                <div class="page-content">
                    <img id="pageLeftImg" src="" alt="Page gauche">
                    <span class="page-number" id="pageLeftNum">1</span>
                </div>
            </div>
            <div class="magazine-page page-right" id="pageRight">
                <div class="page-content">
                    <img id="pageRightImg" src="" alt="Page droite">
                    <span class="page-number" id="pageRightNum">2</span>
                </div>
            </div>
        </div>
        
        <div class="no-magazine" id="noMagazine" style="display: none;">
            <h3>Aucun magazine disponible</h3>
            <p>Veuillez placer votre fichier PDF dans le dossier images et le nommer "magazine.pdf"</p>
        </div>
    </div>

</section>

<!-- ================= JAVASCRIPT ================= -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
    // Configuration PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 0;
    let pageImages = [];
    const scale = 1.5; // Qualité d'affichage

    // Charger le PDF
    async function loadMagazine() {
        const pdfPath = 'images/magazine.pdf';
        
        try {
            // Charger le document PDF
            const loadingTask = pdfjsLib.getDocument(pdfPath);
            pdfDoc = await loadingTask.promise;
            totalPages = pdfDoc.numPages;
            
            // Convertir chaque page en image
            for (let i = 1; i <= totalPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: scale });
                
                // Créer un canvas pour le rendu
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                // Rendre la page
                await page.render({
                    canvasContext: context,
                    viewport: viewport
                }).promise;
                
                // Convertir en image
                pageImages.push(canvas.toDataURL('image/jpeg', 0.9));
            }
            
            // Afficher les pages
            updateDisplay();
            // Vue 1 = page 1 seule, puis pages 2 par 2
            // Si impair, la dernière page est seule
            const remainingPages = totalPages - 1;
            const pairs = Math.floor(remainingPages / 2);
            const hasOddPage = remainingPages % 2 === 1;
            const totalSpreads = 1 + pairs + (hasOddPage ? 1 : 0);
            document.getElementById('totalPages').textContent = totalSpreads;
            
        } catch (error) {
            console.error('Erreur chargement PDF:', error);
            document.querySelector('.magazine-container').style.display = 'none';
            document.getElementById('noMagazine').style.display = 'block';
        }
    }

    // Mettre à jour l'affichage des pages
    function updateDisplay() {
        // Calcul du nombre de "vues" (spreads)
        // Vue 1 = page 1 seule
        // Vue 2+ = pages 2 par 2
        const remainingPages = totalPages - 1;
        const pairs = Math.floor(remainingPages / 2);
        const hasOddPage = remainingPages % 2 === 1;
        const totalSpreads = 1 + pairs + (hasOddPage ? 1 : 0);
        
        // Déterminer les indices des pages à afficher
        let leftIndex, rightIndex;
        
        if (currentPage === 1) {
            // Première vue : page 1 seule
            leftIndex = -1;
            rightIndex = 0;
        } else if (currentPage === totalSpreads && hasOddPage) {
            // Dernière vue si impair : dernière page seule
            leftIndex = -1;
            rightIndex = totalPages - 1;
        } else {
            // Vues du milieu : pages par paires
            leftIndex = (currentPage - 2) * 2;
            rightIndex = leftIndex + 1;
        }
        
        const pageLeftImg = document.getElementById('pageLeftImg');
        const pageRightImg = document.getElementById('pageRightImg');
        const pageLeftNum = document.getElementById('pageLeftNum');
        const pageRightNum = document.getElementById('pageRightNum');
        
        // Page gauche
        if (currentPage === 1 || (currentPage === totalSpreads && hasOddPage)) {
            // Première ou dernière vue seule
            pageLeftImg.src = '';
            pageLeftImg.style.display = 'none';
            pageLeftNum.textContent = '';
            document.querySelector('.page-left').style.visibility = 'hidden';
        } else {
            pageLeftImg.style.display = 'block';
            document.querySelector('.page-left').style.visibility = 'visible';
            if (leftIndex >= 0 && leftIndex < pageImages.length) {
                pageLeftImg.src = pageImages[leftIndex];
                pageLeftNum.textContent = leftIndex + 1;
            } else {
                pageLeftImg.src = '';
                pageLeftNum.textContent = '';
            }
        }
        
        // Page droite
        if (rightIndex >= 0 && rightIndex < pageImages.length) {
            pageRightImg.src = pageImages[rightIndex];
            pageRightNum.textContent = rightIndex + 1;
        } else {
            pageRightImg.src = '';
            pageRightNum.textContent = '';
        }
        
        // Mettre à jour le compteur
        document.getElementById('currentPage').textContent = currentPage;
        document.getElementById('totalPages').textContent = totalSpreads;
        
        // Gérer les boutons
        document.getElementById('prevBtn').disabled = currentPage <= 1;
        document.getElementById('nextBtn').disabled = currentPage >= totalSpreads;
        
        // Animation de retournement et classe CSS
        const book = document.getElementById('magazineBook');
        if (currentPage === 1 || (currentPage === totalSpreads && hasOddPage)) {
            book.classList.remove('flipped');
            book.classList.add('single-page');
        } else {
            book.classList.add('flipped');
            book.classList.remove('single-page');
        }
    }

    // Changer de page
    function changePage(direction) {
        const remainingPages = totalPages - 1;
        const pairs = Math.floor(remainingPages / 2);
        const hasOddPage = remainingPages % 2 === 1;
        const totalSpreads = 1 + pairs + (hasOddPage ? 1 : 0);
        const newPage = currentPage + direction;
        
        if (newPage >= 1 && newPage <= totalSpreads) {
            currentPage = newPage;
            updateDisplay();
        }
    }

    // Navigation clavier
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') changePage(-1);
        if (e.key === 'ArrowRight') changePage(1);
    });

    // ===== ANIMATION AU SCROLL =====
    const scrollElements = document.querySelectorAll(".show-on-scroll");

    const elementInView = (el, offset = 0) => {
        const elementTop = el.getBoundingClientRect().top;
        return elementTop <= (window.innerHeight || document.documentElement.clientHeight) - offset;
    };

    const displayScrollElement = (element) => {
        element.classList.add("visible");
    };

    const handleScrollAnimation = () => {
        scrollElements.forEach(el => {
            if (elementInView(el, 100)) {
                displayScrollElement(el);
            }
        })
    };

    // Attacher les événements
    window.addEventListener("scroll", handleScrollAnimation);
    // Vérifier immédiatement au chargement
    handleScrollAnimation();

    // Initialiser au chargement
    window.addEventListener('load', loadMagazine);
</script>

</body>
<script src="nav.js"></script>
</html>
